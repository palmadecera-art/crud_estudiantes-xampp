version: '3.8'

services:
  web:
    image: php:8.2-apache
    container_name: php_crud
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    command: sh -c "docker-php-ext-install mysqli && apache2-foreground"
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: mysql_crud
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bd_estudiantes
    ports:
      - "3307:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d